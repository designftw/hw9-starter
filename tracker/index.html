<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Personal Tracker</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
                    "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
                    "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
                }
            }
        </script>
        <script src="index.js" type="module"></script>
    </head>
    <body>
        <div id="app">Loading...</div>
        <template id="template">
            <header v-if="!$graffitiSession.value">
                <button @click="$graffiti.login()">Log In</button>
            </header>
            <template v-else>
                <header>
                    <button @click="$graffiti.logout($graffitiSession.value)">
                        Log Out
                    </button>
                </header>

                <main>
                    <p v-if="areUpdatesLoading">Loading...</p>
                    <article v-else v-for="entry in entries" :key="entry.value.id">
                        <form @submit.prevent="saveEntry(entry)">
                            <label>
                                Date & Time:
                                <input
                                    type="datetime-local"
                                    :value="new Date(entry.value.published).toISOString().slice(0, 16)"
                                    @input="e=> entry.value.published = new Date(e.target.value).getTime()"
                                />
                            </label>
                            <label>
                                Notes:
                                <textarea
                                    name="notes"
                                    v-model="entry.value.content"
                                ></textarea>
                            </label>
                            <input type="submit" value="Save" />
                            <button @click.prevent="deleteEntry(entry)">
                                Delete
                            </button>
                        </form>
                    </article>

                    <button @click="addEntry('')">Add entry</button>
                </main>
            </template>
        </>
    </body>
</html>
